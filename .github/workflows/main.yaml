name: Deploy Pulsify Backend

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/pulsify-backend:latest .
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/pulsify-backend:latest

      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_IP }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/pulsify-backend:latest
            sudo docker stop pulsify-api || true
            sudo docker rm pulsify-api || true
            sudo docker run -d \
              --name pulsify-api \
              -p 3000:3000 \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e MONGO_URI="${{ secrets.MONGO_URI }}" \
              -e PORT=3000 \
              ${{ secrets.DOCKER_HUB_USERNAME }}/pulsify-backend:latest

services:
  meilisearch:
    image: getmeili/meilisearch:v1.7
    restart: always          # auto-restarts on server reboot
    environment:
      - MEILI_MASTER_KEY=6f83b271d9a5e4c2b8f1a0d9c3e7f5a2
      - MEILI_NO_ANALYTICS=true
    ports:
      - "7700:7700"
    volumes:
      - ./meili_data:/meili_data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
